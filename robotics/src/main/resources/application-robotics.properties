# Spring Vision Robotics Module Configuration
# Enable/disable the robotics backend
spring.vision.robotics.enabled=false
# Defect Detection Settings
spring.vision.robotics.defect-detection.sensitivity=0.7
spring.vision.robotics.defect-detection.min-defect-size=50
spring.vision.robotics.defect-detection.max-defects-per-image=100
# Robotic Guidance Settings
spring.vision.robotics.robotic-guidance.focal-length=800.0
spring.vision.robotics.robotic-guidance.sensor-width=6.0
spring.vision.robotics.robotic-guidance.use-stereo-vision=false
spring.vision.robotics.robotic-guidance.confidence-threshold=0.6
# Component Verification Settings
spring.vision.robotics.component-verification.strict-mode=false
spring.vision.robotics.component-verification.identification-threshold=0.7
#spring.vision.robotics.component-verification.component-database-path=/path/to/component/database

