<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Million Challenge - Spring Vision</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .header {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5em;
        }
        .header p {
            margin: 10px 0 0 0;
            font-size: 1.1em;
            opacity: 0.9;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .card h2 {
            color: #333;
            margin-top: 0;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            transition: border-color 0.3s;
            margin: 20px 0;
        }
        .upload-area:hover {
            border-color: #667eea;
        }
        .upload-area.dragover {
            border-color: #667eea;
            background-color: #f0f4ff;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: opacity 0.3s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .form-group {
            margin: 15px 0;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .results {
            margin-top: 20px;
        }
        .result-item {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        .similarity-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin: 10px 0;
        }
        .similarity-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48ca48);
            border-radius: 5px;
            transition: width 0.3s;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-weight: bold;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .loading {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-bottom: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }
        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏆 One Million Challenge</h1>
        <p>Sub-second face search across 1M+ photos - Can you beat the challenge?</p>
    </div>

    <div class="container">
        <!-- Face Recognition Card -->
        <div class="card">
            <h2>🔍 Face Recognition Search</h2>
            <div class="upload-area" id="uploadArea">
                <div>
                    <p>📸 Drop an image here or click to select</p>
                    <input type="file" id="imageFile" accept="image/*" style="display: none;">
                    <button class="btn" onclick="document.getElementById('imageFile').click()">Select Image</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>Or enter image URL:</label>
                <input type="url" id="imageUrl" placeholder="https://example.com/photo.jpg">
            </div>
            
            <div class="form-group">
                <label>Maximum results:</label>
                <select id="topK">
                    <option value="5">5 matches</option>
                    <option value="10" selected>10 matches</option>
                    <option value="20">20 matches</option>
                    <option value="50">50 matches</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Minimum similarity:</label>
                <input type="range" id="minSimilarity" min="0" max="1" step="0.1" value="0.6">
                <span id="similarityValue">0.6</span>
            </div>
            
            <button class="btn" id="searchBtn" onclick="performSearch()">🔍 Search Faces</button>
            
            <div id="searchResults"></div>
        </div>

        <!-- System Status Card -->
        <div class="card">
            <h2>📊 System Status</h2>
            <div id="systemStatus">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading system status...</p>
                </div>
            </div>
            <button class="btn" onclick="refreshStatus()">🔄 Refresh Status</button>
        </div>

        <!-- Database Management Card -->
        <div class="card full-width">
            <h2>🗃️ Database Management</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <div class="form-group">
                        <label>Photo directory path:</label>
                        <input type="text" id="directoryPath" placeholder="./sample-photos" value="./sample-photos">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="asyncBuild" checked>
                            Asynchronous processing
                        </label>
                    </div>
                    <button class="btn" onclick="buildDatabase()">🏗️ Build Database</button>
                </div>
                <div id="buildStatus"></div>
            </div>
        </div>
    </div>

    <script>
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            refreshStatus();
            setupEventListeners();
        });

        function setupEventListeners() {
            // File upload drag and drop
            const uploadArea = document.getElementById('uploadArea');
            const imageFile = document.getElementById('imageFile');
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    imageFile.files = files;
                    updateFileName(files[0].name);
                }
            });
            
            imageFile.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    updateFileName(e.target.files[0].name);
                }
            });
            
            // Similarity slider
            const slider = document.getElementById('minSimilarity');
            const valueSpan = document.getElementById('similarityValue');
            slider.addEventListener('input', (e) => {
                valueSpan.textContent = e.target.value;
            });
        }

        function updateFileName(fileName) {
            const uploadArea = document.getElementById('uploadArea');
            uploadArea.querySelector('p').textContent = `📸 Selected: ${fileName}`;
        }

        async function performSearch() {
            const searchBtn = document.getElementById('searchBtn');
            const resultsDiv = document.getElementById('searchResults');
            const imageFile = document.getElementById('imageFile').files[0];
            const imageUrl = document.getElementById('imageUrl').value;
            const topK = document.getElementById('topK').value;
            const minSimilarity = document.getElementById('minSimilarity').value;
            
            if (!imageFile && !imageUrl) {
                showMessage(resultsDiv, 'Please select an image file or enter an image URL', 'error');
                return;
            }
            
            searchBtn.disabled = true;
            resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Searching faces...</p></div>';
            
            try {
                let response;
                
                if (imageFile) {
                    const formData = new FormData();
                    formData.append('file', imageFile);
                    formData.append('topK', topK);
                    formData.append('minSimilarity', minSimilarity);
                    
                    response = await fetch('/api/recognition/search/upload', {
                        method: 'POST',
                        body: formData
                    });
                } else {
                    const params = new URLSearchParams({
                        imageUrl: imageUrl,
                        topK: topK,
                        minSimilarity: minSimilarity
                    });
                    
                    response = await fetch('/api/recognition/search/url', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: params
                    });
                }
                
                const data = await response.json();
                displaySearchResults(data);
                
            } catch (error) {
                showMessage(resultsDiv, 'Search failed: ' + error.message, 'error');
            } finally {
                searchBtn.disabled = false;
            }
        }

        function displaySearchResults(data) {
            const resultsDiv = document.getElementById('searchResults');
            
            if (!data.success) {
                showMessage(resultsDiv, 'Search failed: ' + data.error, 'error');
                return;
            }
            
            let html = `
                <div class="status success">
                    ✅ Search completed in ${data.queryTime}ms - Found ${data.filteredMatches}/${data.totalMatches} matches
                </div>
            `;
            
            if (data.matches && data.matches.length > 0) {
                html += '<div class="results">';
                data.matches.forEach((match, index) => {
                    html += `
                        <div class="result-item">
                            <strong>Match ${index + 1}: ${match.photoId}</strong>
                            <div class="similarity-bar">
                                <div class="similarity-fill" style="width: ${match.similarity * 100}%"></div>
                            </div>
                            <div>Similarity: ${match.similarity.toFixed(3)} | Confidence: ${match.confidence.toFixed(3)}</div>
                        </div>
                    `;
                });
                html += '</div>';
            } else {
                html += '<div class="status info">No matches found with the specified similarity threshold</div>';
            }
            
            resultsDiv.innerHTML = html;
        }

        async function refreshStatus() {
            const statusDiv = document.getElementById('systemStatus');
            statusDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading status...</p></div>';
            
            try {
                const response = await fetch('/api/recognition/status');
                const data = await response.json();
                displaySystemStatus(data);
            } catch (error) {
                statusDiv.innerHTML = '<div class="status error">Failed to load status: ' + error.message + '</div>';
            }
        }

        function displaySystemStatus(data) {
            const statusDiv = document.getElementById('systemStatus');
            
            let html = '<div class="stats-grid">';
            
            // System availability
            html += `
                <div class="stat-card">
                    <div>Recognition Engine</div>
                    <div class="stat-value">${data.recognitionAvailable ? '✅' : '❌'}</div>
                </div>
                <div class="stat-card">
                    <div>Database Builder</div>
                    <div class="stat-value">${data.databaseBuilderAvailable ? '✅' : '❌'}</div>
                </div>
            `;
            
            // Index stats
            if (data.embeddingIndex) {
                html += `
                    <div class="stat-card">
                        <div>Total Faces</div>
                        <div class="stat-value">${data.embeddingIndex.totalEmbeddings.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <div>Memory Usage</div>
                        <div class="stat-value">${data.embeddingIndex.memoryUsageMB.toFixed(1)}MB</div>
                    </div>
                    <div class="stat-card">
                        <div>Avg Query Time</div>
                        <div class="stat-value">${data.embeddingIndex.averageQueryTimeMs.toFixed(1)}ms</div>
                    </div>
                    <div class="stat-card">
                        <div>Index Status</div>
                        <div class="stat-value">${data.embeddingIndex.ready ? '✅' : '⏳'}</div>
                    </div>
                `;
            }
            
            html += '</div>';
            
            // Backend info
            if (data.backend) {
                html += `
                    <div class="status ${data.backend.healthy ? 'success' : 'error'}">
                        Backend: ${data.backend.displayName} (${data.backend.version}) - ${data.backend.status}
                    </div>
                `;
            }
            
            statusDiv.innerHTML = html;
        }

        async function buildDatabase() {
            const directoryPath = document.getElementById('directoryPath').value;
            const asyncBuild = document.getElementById('asyncBuild').checked;
            const buildStatus = document.getElementById('buildStatus');
            
            if (!directoryPath) {
                showMessage(buildStatus, 'Please enter a directory path', 'error');
                return;
            }
            
            buildStatus.innerHTML = '<div class="loading"><div class="spinner"></div><p>Building database...</p></div>';
            
            try {
                const params = new URLSearchParams({
                    directoryPath: directoryPath,
                    async: asyncBuild
                });
                
                const response = await fetch('/api/recognition/database/build', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                
                const data = await response.json();
                displayBuildResults(data);
                
            } catch (error) {
                showMessage(buildStatus, 'Database build failed: ' + error.message, 'error');
            }
        }

        function displayBuildResults(data) {
            const buildStatus = document.getElementById('buildStatus');
            
            if (!data.success) {
                showMessage(buildStatus, 'Build failed: ' + (data.error || data.errorMessage), 'error');
                return;
            }
            
            if (data.async) {
                showMessage(buildStatus, 'Database build started asynchronously. Check logs for progress.', 'info');
            } else {
                let html = `
                    <div class="status success">✅ Database build completed!</div>
                    <div class="result-item">
                        <strong>Results:</strong><br>
                        Files processed: ${data.processedFiles}/${data.totalFiles}<br>
                        Faces extracted: ${data.facesExtracted}<br>
                        Processing rate: ${data.processingRate.toFixed(1)} files/sec<br>
                        Faces per file: ${data.facesPerFile.toFixed(1)}<br>
                        Total time: ${(data.processingTimeMs / 1000).toFixed(1)} seconds
                    </div>
                `;
                if (data.errors > 0) {
                    html += `<div class="status error">Errors: ${data.errors}</div>`;
                }
                buildStatus.innerHTML = html;
            }
            
            // Refresh system status after build
            setTimeout(refreshStatus, 1000);
        }

        function showMessage(container, message, type) {
            container.innerHTML = `<div class="status ${type}">${message}</div>`;
        }
    </script>
</body>
</html>
