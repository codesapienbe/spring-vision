# Spring Vision JavaFX Application Configuration
spring:
  application:
    name: spring-vision-javafx
  main:
    web-application-type: none  # Disable web server for desktop application
  docker:
    compose:
      enabled: true

# Vision Framework Configuration
vision:
  enabled: true
  backend: opencv
  fail-fast: false  # Allow fallback to BasicBackend in examples
  opencv:
    enabled: true
    confidence-threshold: ${VISION_CONFIDENCE_THRESHOLD:0.7}
    min-face-size-ratio: ${VISION_MIN_FACE_SIZE:0.02}
    max-face-size-ratio: ${VISION_MAX_FACE_SIZE:0.95}
    gpu-acceleration: ${VISION_GPU_ACCELERATION:false}
    max-image-size: ${VISION_MAX_IMAGE_SIZE:52428800}
  deepface:
    enabled: ${VISION_DEEPFACE_ENABLED:false}
    api-url: ${VISION_DEEPFACE_API_URL:http://localhost:5000}
    timeout: ${VISION_DEEPFACE_TIMEOUT:30s}
    max-retries: ${VISION_DEEPFACE_MAX_RETRIES:3}
  compreface:
    enabled: ${VISION_COMPREFACE_ENABLED:false}
    api-url: ${VISION_COMPREFACE_API_URL:http://localhost:8000}
    timeout: ${VISION_COMPREFACE_TIMEOUT:30s}
    max-retries: ${VISION_COMPREFACE_MAX_RETRIES:3}
  health:
    enabled: true
    check-interval: ${VISION_HEALTH_CHECK_INTERVAL:30000}
    max-response-time: ${VISION_HEALTH_MAX_RESPONSE_TIME:5000}
  metrics:
    enabled: true
    collection-interval: ${VISION_METRICS_INTERVAL:60000}
    detailed: ${VISION_METRICS_DETAILED:false}

# Logging configuration
logging:
  level:
    com.springvision: ${LOG_LEVEL:INFO}
    io.github.codesapienbe.springvision.examples.javafxapplication: ${LOG_LEVEL:INFO}
    org.springframework: ${SPRING_LOG_LEVEL:WARN}
    javafx: ${JAVAFX_LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/javafx-application.log}
    max-size: ${LOG_MAX_SIZE:10MB}
    max-history: ${LOG_MAX_HISTORY:30}

# Application-specific settings
app:
  javafx:
    window:
      title: ${JAVAFX_WINDOW_TITLE:"Spring Vision - Face Detection"}
      min-width: ${JAVAFX_MIN_WIDTH:800}
      min-height: ${JAVAFX_MIN_HEIGHT:600}
      default-width: ${JAVAFX_DEFAULT_WIDTH:1000}
      default-height: ${JAVAFX_DEFAULT_HEIGHT:700}
    image:
      max-file-size: ${MAX_FILE_SIZE:50MB}
      supported-formats:
        - jpg
        - jpeg
        - png
        - bmp
        - gif
    ui:
      theme: ${JAVAFX_THEME:light}
      enable-drag-drop: ${JAVAFX_DRAG_DROP:true}
      show-progress: ${JAVAFX_SHOW_PROGRESS:true}


