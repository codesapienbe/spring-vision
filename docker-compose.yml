services:

  spring-vision-mcp:
    image: codesapienbe/spring-vision-mcp:latest
    container_name: spring-vision-mcp
    stdin_open: true  # Enable stdin for MCP stdio transport
    tty: true  # Allocate a pseudo-TTY
    environment:
      - SPRING_PROFILES_ACTIVE=default
      # JVM heap and tuning: set max heap to 4GB
      - JAVA_TOOL_OPTIONS=-Xmx4g
      # Configure DJL concurrency via environment (Spring relaxed binding)
      - SPRING_VISION_DJL_MAX_CONCURRENT_INFERENCES=16
      # Allow native libs (OpenMP / MKL) to use multiple threads. Tune to CPU cores.
      - OMP_NUM_THREADS=8
      - MKL_NUM_THREADS=8
    restart: unless-stopped
    networks:
      - spring-vision-network
    volumes:
      - ./logs:/app/logs  # Mount logs directory

networks:
  spring-vision-network:
    driver: bridge
