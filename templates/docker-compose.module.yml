# Template docker-compose file for Spring Vision modules
#
# Copy this file to your module directory and customize it for your needs.
# Spring Boot will automatically detect and start services during integration tests
# when spring-boot-docker-compose dependency is present.
#
# Usage:
# 1. Copy to your module: cp templates/docker-compose.module.yml <module>/docker-compose.yml
# 2. Update service name, image, ports, and health checks
# 3. Add spring-boot-docker-compose dependency to your module's pom.xml (test scope)
# 4. Run integration tests: mvn verify
#
# Spring Boot will automatically:
# - Start services before tests
# - Wait for health checks
# - Stop and cleanup after tests
# - Set connection properties as system properties

version: '3.8'

services:
  # Main service for your module
  my-service:
    image: my-service-image:latest
    container_name: sv-${MODULE_NAME}-it
    ports:
      # Bind to localhost only for security
      - "127.0.0.1:${SERVICE_PORT}:${CONTAINER_PORT}"
    environment:
      # Add any environment variables your service needs
      - SERVICE_CONFIG=value
    volumes:
      # Add volumes if your service needs persistent storage
      - service-data:/data
    networks:
      - sv-${MODULE_NAME}-network
    healthcheck:
      # Critical: Define a health check so Spring Boot knows when service is ready
      test: [ "CMD-SHELL", "curl -f http://localhost:${CONTAINER_PORT}/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  # Optional: Add dependent services (databases, message queues, etc.)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: sv-${MODULE_NAME}-postgres
  #   environment:
  #     POSTGRES_DB: mydb
  #     POSTGRES_USER: user
  #     POSTGRES_PASSWORD: password
  #   ports:
  #     - "127.0.0.1:5432:5432"
  #   networks:
  #     - sv-${MODULE_NAME}-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U user"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  service-data:
    driver: local

networks:
  sv-${MODULE_NAME}-network:
    driver: bridge

