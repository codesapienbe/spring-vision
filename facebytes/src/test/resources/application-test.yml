# Test configuration for FaceBytes module
# This file configures the test environment for integration tests

logging:
  level:
    com.deepface: DEBUG
    org.opencv: WARN
    ai.djl: WARN
    com.microsoft.onnxruntime: WARN

# Test-specific configurations
test:
  # Enable synthetic test image generation
  synthetic-images: true
  
  # Test image dimensions
  image:
    width: 200
    height: 200
  
  # Face detection test settings
  face-detection:
    min-confidence: 0.1
    max-faces: 10
  
  # Embedding test settings
  embedding:
    mock-mode: true  # Use mock embeddings for testing
    dimension: 512
  
  # Performance test settings
  performance:
    timeout-ms: 30000  # 30 seconds timeout for tests
    max-memory-mb: 512  # Limit memory usage during tests

# Disable real model loading during tests
models:
  vgg-face:
    enabled: false
    mock-mode: true
  
  arcface:
    enabled: false
    mock-mode: true
  
  facenet:
    enabled: false
    mock-mode: true

# Face detection backend configuration for tests
detection:
  opencv:
    enabled: true
    cascade-file: "haarcascade_frontalface_default.xml"
  
  mtcnn:
    enabled: false  # Disable during tests for speed
  
  retinaface:
    enabled: false  # Disable during tests for speed

# Distance metric thresholds for testing
thresholds:
  cosine: 0.68
  euclidean: 0.60
  euclidean-l2: 1.13 