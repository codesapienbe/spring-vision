spring:
  application:
    name: gwt-application
  profiles:
    active: dev

# Vision Framework Configuration
vision:
  enabled: true
  backend: opencv
  opencv:
    enabled: true
    confidence-threshold: 0.5  # Lower threshold for better detection
    min-face-size-ratio: 0.02  # Very small minimum face size for crowd detection
    max-face-size-ratio: 0.95  # Very large maximum face size
    gpu-acceleration: false
    max-image-size: 52428800  # 50MB
  health:
    enabled: true
    check-interval: 30000     # 30 seconds
    max-response-time: 5000   # 5 seconds
  metrics:
    enabled: true
    collection-interval: 60000 # 1 minute
    detailed: false

  main:
    allow-bean-definition-overriding: true

# GWT Configuration
gwt:
  enabled: true
  module-name: com.springvision.examples.gwtapplication.GwtApplication
  compile-on-startup: true
  source-path: src/main/java
  style: DETAILED  # Options: OBFUSCATED, PRETTY, DETAILED
  dev-mode:
    enabled: true
    code-server-port: 9876
    auto-reload: true
  production:
    optimize: true
    compress-javascript: true
  rpc:
    enabled: true
    endpoint-base-path: /gwt/rpc
    validation-enabled: true
  ui:
    theme: standard
    locale: en_US
    default-encoding: UTF-8

# Server Configuration
server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 2KB

# Logging Configuration
logging:
  level:
    com.springvision: INFO
    com.springvision.examples: DEBUG
    org.springframework.web: INFO
    org.bytedeco: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","component":"%logger{36}","message":"%msg","correlation_id":"%X{correlationId:-}","user_id":"%X{userId:-}","request_id":"%X{requestId:-}"}%n'
  file:
    name: application.log
    max-size: 1000MB
    max-history: 30

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: gwt-application
      environment: development

# Development Profile
---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.springvision: DEBUG
    com.springvision.examples: DEBUG
    org.springframework.web: DEBUG

vision:
  opencv:
    confidence-threshold: 0.7

gwt:
  dev-mode:
    enabled: true
    auto-reload: true
  style: DETAILED

management:
  endpoint:
    health:
      show-details: always

# Production Profile
---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    com.springvision: INFO
    com.springvision.examples: INFO
    org.springframework.web: WARN

vision:
  opencv:
    confidence-threshold: 0.8
    gpu-acceleration: true

gwt:
  dev-mode:
    enabled: false
  style: OBFUSCATED
  production:
    optimize: true
    compress-javascript: true

management:
  endpoint:
    health:
      show-details: when-authorized

# Test Profile
---
spring:
  config:
    activate:
      on-profile: test

logging:
  level:
    com.springvision: WARN
    com.springvision.examples: WARN
    root: WARN

vision:
  opencv:
    confidence-threshold: 0.6

gwt:
  dev-mode:
    enabled: false
  compile-on-startup: false

management:
  endpoints:
    web:
      exposure:
        include: health
