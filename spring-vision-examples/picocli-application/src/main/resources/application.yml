# Spring Vision PicoCLI Application Configuration
spring:
  application:
    name: spring-vision-picocli
  banner:
    mode: console
  main:
    banner-mode: console
    web-application-type: none  # Disable web server for CLI application

# Vision configuration
vision:
  backend:
    type: opencv
    enabled: true
  logging:
    level: INFO
    format: structured

# Logging configuration
logging:
  level:
    com.springvision: INFO
    com.springvision.examples.picocliapplication: INFO
    org.springframework: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/picocli-application.log
    max-size: 10MB
    max-history: 30

# Application-specific settings
app:
  cli:
    default-output-format: text
    enable-verbose-logging: false
    max-file-size: 50MB
    supported-formats:
      - jpg
      - jpeg
      - png
      - bmp
      - tiff


