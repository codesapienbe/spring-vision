<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Spring Vision - JPA Vector Example</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      .card { border: 1px solid #ddd; padding: 1rem; margin-bottom: 1rem; border-radius: 6px; }
      label { display:block; margin-bottom: .5rem; font-weight:600 }
      .result { margin-top: .5rem; white-space: pre-wrap; font-family: monospace }
      button { padding: .5rem 1rem; }
    </style>
  </head>
  <body>
    <h1>JPA Vector Example</h1>

    <div class="card">
      <h2>Register Person</h2>
      <label for="personId">Person ID</label>
      <input id="personId" type="text" value="person-123" />
      <label for="fileRegister">Photo to register</label>
      <input id="fileRegister" type="file" accept="image/*" />
      <div style="margin-top:.5rem">
        <button id="btnRegister">Register Face</button>
      </div>
      <div id="registerResult" class="result"></div>
    </div>

    <div class="card">
      <h2>Lookup Faces</h2>
      <label for="fileLookup">Photo to lookup</label>
      <input id="fileLookup" type="file" accept="image/*" />
      <div style="margin-top:.5rem">
        <button id="btnLookup">Lookup</button>
      </div>
      <div id="lookupResult" class="result"></div>
    </div>

    <script>
      async function postMultipart(url, formData) {
        const res = await fetch(url, { method: 'POST', body: formData });
        if (!res.ok) throw new Error('Request failed: ' + res.statusText);
        return res.json ? await res.json() : null;
      }

      document.getElementById('btnRegister').addEventListener('click', async () => {
        const fileInput = document.getElementById('fileRegister');
        const personId = document.getElementById('personId').value;
        const resultEl = document.getElementById('registerResult');
        resultEl.textContent = '';
        if (!fileInput.files.length) { resultEl.textContent = 'Choose a file first.'; return; }
        const fd = new FormData();
        fd.append('personId', personId);
        fd.append('file', fileInput.files[0]);
        try {
          const res = await fetch('/api/faces/register', { method: 'POST', body: fd });
          const text = await res.text();
          if (!res.ok) {
            resultEl.textContent = 'Error: ' + text;
          } else {
            resultEl.textContent = 'Registered embedding id: ' + text;
          }
        } catch (e) { resultEl.textContent = 'Request failed: ' + e.message; }
      });

      document.getElementById('btnLookup').addEventListener('click', async () => {
        const fileInput = document.getElementById('fileLookup');
        const resultEl = document.getElementById('lookupResult');
        resultEl.textContent = '';
        if (!fileInput.files.length) { resultEl.textContent = 'Choose a file first.'; return; }
        const fd = new FormData();
        fd.append('file', fileInput.files[0]);
        try {
          const res = await fetch('/api/faces/lookup', { method: 'POST', body: fd });
          if (!res.ok) {
            resultEl.textContent = 'Lookup failed: ' + await res.text();
            return;
          }
          const json = await res.json();
          if (!json || json.length === 0) {
            resultEl.textContent = 'No matches found.';
            return;
          }
          resultEl.textContent = JSON.stringify(json, null, 2);
        } catch (e) { resultEl.textContent = 'Request failed: ' + e.message; }
      });
    </script>
  </body>
</html>
