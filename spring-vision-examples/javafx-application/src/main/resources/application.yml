# Spring Vision JavaFX Application Configuration
spring:
  application:
    name: spring-vision-javafx
  banner:
    mode: console
  main:
    banner-mode: console
    web-application-type: none  # Disable web server for desktop application
  docker:
    compose:
      enabled: false  # Disable Docker Compose integration for desktop application

# Vision configuration
vision:
  # Select backend: opencv | facebytes
  backend: opencv
  logging:
    level: INFO
    format: structured

# Logging configuration
logging:
  level:
    com.springvision: INFO
    com.springvision.examples.javafxapplication: INFO
    org.springframework: WARN
    javafx: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/javafx-application.log
    max-size: 10MB
    max-history: 30

# Application-specific settings
app:
  javafx:
    window:
      title: "Spring Vision - Face Detection"
      min-width: 800
      min-height: 600
      default-width: 1000
      default-height: 700
    image:
      max-file-size: 50MB
      supported-formats:
        - jpg
        - jpeg
        - png
        - bmp
        - gif
    ui:
      theme: light
      enable-drag-drop: true
      show-progress: true


