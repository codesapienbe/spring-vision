spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/springvision_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  vision:
    vector:
      provider: pgvector 