spring:
  application:
    name: spring-vision-deepface-producer
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      retries: 3
      acks: all
      request-timeout-ms: 30000
      delivery-timeout-ms: 60000
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: true
      group-id: face-extraction-producer
  main:
    allow-bean-definition-overriding: true

# Server Configuration
server:
  port: ${SERVER_PORT:8092}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 2KB

# Logging Configuration
logging:
  level:
    com.springvision: ${LOG_LEVEL:INFO}
    com.springvision.deepface: ${LOG_LEVEL:INFO}
    org.springframework.web: INFO
    org.springframework.kafka: ${LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","component":"%logger{36}","message":"%msg","correlation_id":"%X{correlationId:-}","user_id":"%X{userId:-}","request_id":"%X{requestId:-}"}%n'
  file:
    name: application.log
    max-size: 1000MB
    max-history: 30

# Kafka Configuration
kafka:
  topic:
    face-tasks: face-tasks

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
