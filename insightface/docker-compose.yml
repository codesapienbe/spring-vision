version: '3.8'

services:
  insightface:
    # InsightFace REST API server
    # Note: You may need to build your own image or use a community image
    # Example: https://github.com/SthPhoenix/InsightFace-REST
    image: sthphoenix/insightface-rest:latest
    container_name: sv-insightface-it
    ports:
      - "127.0.0.1:18081:18081"
    environment:
      - PYTHONUNBUFFERED=0
      - LOG_LEVEL=INFO
      - GPUS=0
      - NUM_WORKERS=1
      # Models to load (buffalo_l is high accuracy)
      - INFERENCE_BACKEND=onnx
      - DET_NAME=retinaface_r50_v1
      - REC_NAME=arcface_r100_v1
      - GA_NAME=genderage_v1
      - MASK_DETECTOR=mask_detector
    volumes:
      - insightface-models:/models
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:18081/info" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

volumes:
  insightface-models:
    driver: local

