name: Maven Deploy

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'        # Tag releases with v1.0.0 to trigger release deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21, configure servers and GPG
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          server-ids: 'ossrh'
          server-username: ${{ secrets.OSSRH_USERNAME }}
          server-password: ${{ secrets.OSSRH_PASSWORD }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and deploy
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Use batch mode and skip tests for faster CI deployments. Remove -DskipTests if you want tests.
          mvn -B -DskipTests clean deploy

      - name: Post-deploy info
        if: success()
        run: |
          echo "Maven deploy finished. If this was a release (non-SNAPSHOT version), check Sonatype OSSRH staging: https://s01.oss.sonatype.org/"

