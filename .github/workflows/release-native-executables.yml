name: Release JAR
on:
  push:
    tags:
      - 'v*'
      - '!v*-native'

jobs:
  build-mcp:
    name: Build MCP JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ubuntu-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ubuntu-maven-

      - name: Build MCP JAR
        run: |
          mvn -B -pl mcp -am clean package -DskipTests

      - name: Upload MCP JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-jar
          path: mcp/target/mcp-*.jar
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-mcp
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set VERSION
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}  # Remove 'v' prefix
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Spring Vision ${{ github.ref_name }}

            This release includes the MCP server JAR.

            ### Downloads
            - **MCP Server JAR**: `mcp-${{ env.VERSION }}.jar` (requires Java 21+)

            ### Running the MCP Server
            ```bash
            java -jar mcp-${{ env.VERSION }}.jar
            ```

            ### Features
            - Computer vision capabilities via MCP
            - Stdio transport for MCP clients
            - Easy to integrate with AI assistants
          draft: false
          prerelease: false

      - name: Upload MCP JAR release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/mcp-jar/mcp-*.jar
          asset_name: mcp-${{ env.VERSION }}.jar
          asset_content_type: application/java-archive
