name: Release JAR
on:
  push:
    tags:
      - 'v*'

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Verify required secrets and variables
        run: |
          if [ -z "$APP_ID" ]; then
            echo "Error: APP_ID variable is not set in repository variables."
            exit 1
          fi
          if [ -z "$APP_PRIVATE_KEY" ]; then
            echo "Error: APP_PRIVATE_KEY secret is not set in repository secrets."
            exit 1
          fi
          echo "All required secrets and variables are present."
        env:
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  build-jars:
    name: Build JARs
    needs: check-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ubuntu-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ubuntu-maven-

      - name: Build JARs
        run: |
          mvn -B -pl core,mcp,starter -am clean package -DskipTests -Pdownload-models

      - name: Upload core JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-jar
          path: core/target/core-*.jar
          if-no-files-found: error

      - name: Upload mcp JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-jar
          path: mcp/target/mcp-*.jar
          if-no-files-found: error

      - name: Upload starter JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: starter-jar
          path: starter/target/starter-*.jar
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-jars
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set VERSION
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}  # Remove 'v' prefix
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Spring Vision ${{ github.ref_name }}

            This release includes JARs for core, mcp, and starter modules.

            ### Downloads
            - **Core JAR**: `core-${{ env.VERSION }}.jar`
            - **MCP Server JAR**: `mcp-${{ env.VERSION }}.jar` (requires Java 21+)
            - **Starter JAR**: `starter-${{ env.VERSION }}.jar`

            ### Running the MCP Server
            ```bash
            java -jar mcp-${{ env.VERSION }}.jar
            ```

            ### Features
            - Computer vision capabilities via MCP
            - Stdio transport for MCP clients
            - Easy to integrate with AI assistants
          draft: false
          prerelease: false

  upload-core:
    name: Upload Core JAR
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Download core JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: core-jar
          path: .

      - name: Set VERSION
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}  # Remove 'v' prefix
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload Core JAR release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./core-${{ env.VERSION }}.jar
          asset_name: core-${{ env.VERSION }}.jar
          asset_content_type: application/java-archive

  upload-starter:
    name: Upload Starter JAR
    needs: [ create-release, upload-core ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Download starter JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: starter-jar
          path: .

      - name: Set VERSION
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}  # Remove 'v' prefix
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload Starter JAR release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./starter-${{ env.VERSION }}.jar
          asset_name: starter-${{ env.VERSION }}.jar
          asset_content_type: application/java-archive

  upload-mcp:
    name: Upload MCP JAR
    needs: [ create-release, upload-starter ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Download mcp JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: mcp-jar
          path: .

      - name: Set VERSION
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}  # Remove 'v' prefix
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload MCP JAR release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./mcp-${{ env.VERSION }}.jar
          asset_name: mcp-${{ env.VERSION }}.jar
          asset_content_type: application/java-archive
