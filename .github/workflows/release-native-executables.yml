name: Release JAR
on:
  push:
    tags:
      - 'v*'
      - '!v*-native'

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Verify required secrets and variables
        run: |
          if [ -z "$APP_ID" ]; then
            echo "Error: APP_ID variable is not set in repository variables."
            exit 1
          fi
          if [ -z "$APP_PRIVATE_KEY" ]; then
            echo "Error: APP_PRIVATE_KEY secret is not set in repository secrets."
            exit 1
          fi
          echo "All required secrets and variables are present."
        env:
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  build-mcp:
    name: Build MCP JAR
    needs: check-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ubuntu-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ubuntu-maven-

      - name: Build MCP JAR
        run: |
          mvn -B -pl mcp -am clean package -DskipTests

      - name: Upload MCP JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-jar
          path: mcp/target/mcp-*.jar
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-mcp
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set VERSION
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}  # Remove 'v' prefix
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Spring Vision ${{ github.ref_name }}

            This release includes the MCP server JAR.

            ### Downloads
            - **MCP Server JAR**: `mcp-${{ env.VERSION }}.jar` (requires Java 21+)

            ### Running the MCP Server
            ```bash
            java -jar mcp-${{ env.VERSION }}.jar
            ```

            ### Features
            - Computer vision capabilities via MCP
            - Stdio transport for MCP clients
            - Easy to integrate with AI assistants
          draft: false
          prerelease: false

      - name: Upload MCP JAR release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/mcp-jar/mcp-*.jar
          asset_name: mcp-${{ env.VERSION }}.jar
          asset_content_type: application/java-archive
