name: Publish to GitHub Packages
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 and configure Maven server for GitHub Packages
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_PACKAGES_TOKEN }}

      - name: Build and deploy to GitHub Packages
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Optional: import GPG key if provided so artifacts can be signed
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            export MAVEN_GPG_PASSPHRASE="$GPG_PASSPHRASE"
          fi
          mvn -B -DskipTests deploy


