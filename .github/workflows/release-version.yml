name: Release Version
on:
  push:
    paths:
      - 'VERSION'
    branches:
      - main

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Verify required secrets and variables
        run: |
          if [ -z "$APP_ID" ]; then
            echo "Error: APP_ID variable is not set in repository variables."
            exit 1
          fi
          if [ -z "$APP_PRIVATE_KEY" ]; then
            echo "Error: APP_PRIVATE_KEY secret is not set in repository secrets."
            exit 1
          fi
          echo "All required secrets and variables are present."
        env:
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  release-version:
    name: Release Version
    needs: check-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper tagging

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set VERSION
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Releasing version: $VERSION"

      - name: Create and push git tag
        run: |
          # Delete local tag if it exists (to overwrite it)
          git tag -d v${{ env.VERSION }} 2>/dev/null || true

          # Create annotated git tag
          git tag -a v${{ env.VERSION }} -m "Release v${{ env.VERSION }}"

          # Check if tag exists in remote and force push if needed
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ env.VERSION }}"; then
            echo "Tag v${{ env.VERSION }} exists in remote, force pushing..."
            git push --force origin v${{ env.VERSION }}
          else
            echo "Tag v${{ env.VERSION }} does not exist in remote, pushing..."
            git push origin v${{ env.VERSION }}
          fi
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Log release completion
        run: |
          echo "✅ Version ${{ env.VERSION }} has been successfully tagged and released!"
          echo "📦 Release JARs will be built and published automatically via release-native-executables workflow"
          echo "🤖 This automated the equivalent of: make release"
