version: '3.8'

services:
  compreface:
    image: exadel/compreface:latest
    container_name: sv-compreface-it
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/compreface
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EXTERNAL_DB: "true"
      API_JAVA_OPTS: "-Xmx2g"
    ports:
      - "127.0.0.1:8000:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sv-compreface-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:80/api/v1/recognition/detect || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:15-alpine
    container_name: sv-compreface-postgres
    environment:
      POSTGRES_DB: compreface
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - sv-compreface-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  sv-compreface-network:
    driver: bridge

