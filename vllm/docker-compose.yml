version: '3.8'

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: spring-vision-vllm
    ports:
      - "8000:8000"
    environment:
      - VLLM_ALLOW_RUNTIME_LORA_UPDATING=true
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - vllm-cache:/root/.cache/huggingface
    command:
      - --model
      - ibm-granite/granite-3.2-8b-instruct
      - --trust-remote-code
      - --dtype
      - auto
      - --max-model-len
      - "4096"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  vllm-cache:
    driver: local

