name: Spring Vision Core Test Automation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'spring-vision-core/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'spring-vision-core/**'
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - performance
          - security
          - suite
      opencv_available:
        description: 'Enable OpenCV for integration tests'
        required: false
        default: false
        type: boolean
      parallel_execution:
        description: 'Enable parallel test execution'
        required: false
        default: true
        type: boolean

env:
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.5'
  OPENCV_VERSION: '4.8.1'
  JACOCO_VERSION: '0.8.11'

jobs:
  # Prerequisites check
  prerequisites:
    name: Check Prerequisites
    runs-on: ubuntu-latest
    outputs:
      opencv_available: ${{ steps.check_opencv.outputs.available }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Check OpenCV availability
        id: check_opencv
        run: |
          # Check if OpenCV is available in the system
          if command -v pkg-config >/dev/null 2>&1 && pkg-config --exists opencv4; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "OpenCV is available"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "OpenCV is not available"
          fi

  # Unit tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: prerequisites
    strategy:
      matrix:
        java: ['21']
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run unit tests
        run: |
          cd spring-vision-core
          mvn test -Dtest=*Test -DexcludedGroups=integration,performance,security \
                   -Dspring.profiles.active=test \
                   -Dparallel=true -DthreadCount=4

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.os }}-${{ matrix.java }}
          path: spring-vision-core/target/surefire-reports/
          retention-days: 30

  # Integration tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: prerequisites
    if: needs.prerequisites.outputs.opencv_available == 'true' || github.event.inputs.opencv_available == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Install OpenCV dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev opencv-data

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run integration tests
        run: |
          cd spring-vision-core
          mvn test -Dtest=*IntegrationTest \
                   -Dspring.profiles.active=test \
                   -Dopencv.available=true \
                   -Dparallel=true -DthreadCount=2

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: spring-vision-core/target/surefire-reports/
          retention-days: 30

  # Performance tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: prerequisites
    if: github.event.inputs.test_type == 'performance' || github.event.inputs.test_type == 'all'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Install OpenCV dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev opencv-data

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run performance tests
        run: |
          cd spring-vision-core
          mvn test -Dtest=*PerformanceTest \
                   -Dspring.profiles.active=test \
                   -Dopencv.available=true \
                   -Dparallel=false

      - name: Upload performance test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-results
          path: spring-vision-core/target/surefire-reports/
          retention-days: 30

  # Security tests
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: prerequisites
    if: github.event.inputs.test_type == 'security' || github.event.inputs.test_type == 'all'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run security tests
        run: |
          cd spring-vision-core
          mvn test -Dtest=*SecurityTest \
                   -Dspring.profiles.active=test \
                   -Dparallel=true -DthreadCount=4

      - name: Upload security test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: spring-vision-core/target/surefire-reports/
          retention-days: 30

  # Test suite
  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: prerequisites
    if: github.event.inputs.test_type == 'suite' || github.event.inputs.test_type == 'all'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Install OpenCV dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev opencv-data

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run test suite
        run: |
          cd spring-vision-core
          mvn test -Dtest=*TestSuite \
                   -Dspring.profiles.active=test \
                   -Dopencv.available=true \
                   -Dparallel=true -DthreadCount=4

      - name: Upload test suite results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-suite-results
          path: spring-vision-core/target/surefire-reports/
          retention-days: 30

  # Code coverage
  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always() && (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'failure')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Generate coverage report
        run: |
          cd spring-vision-core
          mvn jacoco:report

      - name: Check coverage thresholds
        run: |
          cd spring-vision-core
          mvn jacoco:check

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: spring-vision-core/target/site/jacoco/
          retention-days: 90

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./spring-vision-core/target/site/jacoco/jacoco.xml
          flags: core
          name: spring-vision-core-coverage

  # Static analysis
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Spotless check
        run: |
          cd spring-vision-core
          mvn spotless:check

      - name: Run Checkstyle
        run: |
          cd spring-vision-core
          mvn checkstyle:check

      - name: Run dependency check
        run: |
          cd spring-vision-core
          mvn org.owasp:dependency-check-maven:check

  # Test quality metrics
  test-quality:
    name: Test Quality Metrics
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, code-coverage]
    if: always() && (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'failure')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results-ubuntu-latest-21

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Analyze test quality
        run: |
          # Analyze test execution time
          echo "Test Quality Analysis:" >> quality-report.txt
          echo "=====================" >> quality-report.txt
          echo "" >> quality-report.txt

          # Count test methods
          TEST_COUNT=$(find . -name "TEST-*.xml" -exec grep -c "<testcase" {} + | awk '{sum += $1} END {print sum}')
          echo "Total test methods: $TEST_COUNT" >> quality-report.txt

          # Check coverage thresholds
          if [ -f "jacoco.xml" ]; then
            echo "Coverage report available" >> quality-report.txt
          else
            echo "Coverage report not found" >> quality-report.txt
          fi

          # Check test execution time
          echo "Test execution completed" >> quality-report.txt

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: test-quality-report
          path: quality-report.txt
          retention-days: 30

  # Test automation summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, performance-tests, security-tests, test-suite, code-coverage, static-analysis, test-quality]
    if: always()
    steps:
      - name: Generate test summary
        run: |
          echo "# Spring Vision Core Test Automation Summary" >> test-summary.md
          echo "" >> test-summary.md
          echo "## Test Results" >> test-summary.md
          echo "" >> test-summary.md
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> test-summary.md
          echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> test-summary.md
          echo "- Performance Tests: ${{ needs.performance-tests.result }}" >> test-summary.md
          echo "- Security Tests: ${{ needs.security-tests.result }}" >> test-summary.md
          echo "- Test Suite: ${{ needs.test-suite.result }}" >> test-summary.md
          echo "- Code Coverage: ${{ needs.code-coverage.result }}" >> test-summary.md
          echo "- Static Analysis: ${{ needs.static-analysis.result }}" >> test-summary.md
          echo "- Test Quality: ${{ needs.test-quality.result }}" >> test-summary.md
          echo "" >> test-summary.md
          echo "## Overall Status" >> test-summary.md
          echo "" >> test-summary.md

          # Determine overall status
          if [[ "${{ needs.unit-tests.result }}" == "success" && "${{ needs.integration-tests.result }}" == "success" && "${{ needs.static-analysis.result }}" == "success" ]]; then
            echo "✅ All critical tests passed" >> test-summary.md
          else
            echo "❌ Some tests failed" >> test-summary.md
          fi

      - name: Upload test summary
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: test-summary.md
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('test-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
