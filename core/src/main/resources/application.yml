# Spring Vision Core Configuration
# For comprehensive documentation, see: docs/gpu.md

spring:
  vision:
    # ONNX Runtime Execution Provider
    # Supported values: cpu (default), gpu
    # GPU requires CUDA-compatible hardware, drivers, and building with -P gpu profile
    execution-provider: cpu

    # Vision backend selection
    # Supported backends: opencv (default), mediapipe, yolo, deepface, facebytes
    backend: opencv
    enabled: true
    fail-fast: true

    # OpenCV Configuration
    opencv:
      enabled: true
      confidence-threshold: 0.7
      min-face-size-ratio: 0.1
      max-face-size-ratio: 0.8
      gpu-acceleration: false
      max-image-size: 10485760  # 10MB

    # Health Monitoring
    health:
      enabled: true
      check-interval: 30000  # 30 seconds
      max-response-time: 5000  # 5 seconds

    # Metrics
    metrics:
      enabled: true
      collection-interval: 60000  # 60 seconds
      detailed: false

    # ONNX Model Configuration
    model:
      onnx:
        enabled: true
