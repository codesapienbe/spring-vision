# Multi-backend configuration example
# OpenCV provides face detection, FaceBytes provides embeddings
spring:
  vision:
    opencv:
      enabled: true
    facebytes:
      enabled: true

# When both backends are enabled:
# - Face detection uses OpenCvVisionBackend
# - Embedding extraction uses FaceBytesBackend (via EmbeddingSupport fallback)
# VisionTemplate automatically routes operations based on backend capabilities
