# ============================================================================
# DJL (Deep Java Library) Configuration
# ============================================================================
# Enable DJL backend (disabled by default to allow gradual migration)
spring.vision.djl.enabled=false
# Preferred inference engine
# Options: PyTorch, OnnxRuntime, TensorFlow, MXNet
spring.vision.djl.engine=PyTorch
# GPU acceleration (requires CUDA toolkit and compatible GPU)
spring.vision.djl.use-gpu=false
# Custom cache directory for DJL models
# Defaults to ${user.home}/.djl.ai if not specified
#spring.vision.djl.cache-dir=${user.home}/.djl.ai
# Model Zoo location (comma-separated URLs)
# Can include: file://, https://, s3://, hdfs://
#spring.vision.djl.model-zoo-location=file:///var/models,https://mlrepo.djl.ai/model
# Face detection model path (optional)
# If not specified, will use DJL ModelZoo default
#spring.vision.djl.face-detection-model=/path/to/face_detection_model
# Face recognition model path (optional)
#spring.vision.djl.face-recognition-model=/path/to/face_recognition_model
# Minimum confidence threshold for detections (0.0 - 1.0)
spring.vision.djl.confidence-threshold=0.5
# Maximum number of concurrent inference operations
spring.vision.djl.max-concurrent-inferences=4
# ============================================================================
# DJL Model Loading Examples
# ============================================================================
# Example 1: Load from local filesystem
#spring.vision.djl.face-detection-model=file:///var/models/yunet.onnx
# Example 2: Load from HTTPS URL
#spring.vision.djl.face-detection-model=https://example.com/models/yunet.onnx
# Example 3: Load from DJL ModelZoo
#spring.vision.djl.face-detection-model=djl://ai.djl.pytorch/resnet
# Example 4: Load from S3 (requires djl-aws extension)
#spring.vision.djl.face-detection-model=s3://my-bucket/models/yunet.onnx
# Example 5: Load from HDFS (requires djl-hadoop extension)
#spring.vision.djl.face-detection-model=hdfs://namenode:9000/models/yunet.onnx

