# Spring Vision MCP Server Configuration
# Model Context Protocol server for Spring Vision computer vision capabilities

spring:
  application:
    name: spring-vision-mcp

  # Main application settings
  main:
    web-application-type: reactive  # Enable reactive web for WebFlux
    banner-mode: off  # Disable banner for cleaner output

  # Jackson JSON configuration
  jackson:
    serialization:
      indent-output: false
      fail-on-empty-beans: false

  # Spring Vision Configuration
  vision:
    opencv:
      enabled: true
      confidence-threshold: 0.7

  # MCP Server Configuration
  ai:
    mcp:
      server:
        transport: sse  # Use SSE (Server-Sent Events) over HTTP
        sse:
          path: /mcp/sse  # SSE endpoint path
        name: spring-vision
        version: "1.0.3"
        description: "Spring Vision MCP Server - Computer Vision Operations via Model Context Protocol"

# Server settings
server:
  port: 8081  # Use port 8081 to avoid conflict with Jenkins on 8080

# Logging configuration
logging:
  level:
    root: INFO
    io.github.codesapienbe.springvision: INFO
    org.springframework.ai.mcp: DEBUG
    org.springframework.ai.mcp.server: DEBUG
    io.modelcontextprotocol: INFO
    org.springframework.web.reactive: DEBUG
