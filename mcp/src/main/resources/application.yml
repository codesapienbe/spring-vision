# Spring Vision MCP Server Configuration
# Model Context Protocol server for Spring Vision computer vision capabilities

spring:
  application:
    name: spring-vision-mcp

  # Main application settings
  main:
    web-application-type: none  # Disable web for stdio transport
    banner-mode: off  # Disable banner for cleaner output

  # Jackson JSON configuration
  jackson:
    serialization:
      indent-output: false
      fail-on-empty-beans: false

  # Spring Vision Configuration
  vision:
    opencv:
      enabled: true
      confidence-threshold: 0.7
    facebytes:
      enabled: true
      detector-backend: retinaface

  # MCP Server Configuration (Spring AI 1.0.0 - stdio transport)
  ai:
    mcp:
      server:
        enabled: true
        transport: stdio
        name: spring-vision
        version: "1.0.5"
        description: "Spring Vision MCP Server - Computer Vision Operations via Model Context Protocol"

# Logging configuration - JSON format via logback-spring.xml
# CRITICAL: All logs go to stderr (console) or files, NOT stdout
# stdout is RESERVED for MCP JSON-RPC protocol messages only
logging:
  level:
    root: INFO
    io.github.codesapienbe.springvision: INFO
    org.springframework.ai: WARN
    org.springframework.ai.mcp: INFO
  # Pattern and file configurations are managed by logback-spring.xml
  # All logs use JSON format for consistent parsing
