# Spring Vision MCP Server Configuration
# Model Context Protocol server for Spring Vision computer vision capabilities

spring:
  application:
    name: spring-vision-mcp

  # Main application settings
  main:
    web-application-type: none  # Disable web for stdio transport
    banner-mode: off  # Disable banner for cleaner output

  # Jackson JSON configuration
  jackson:
    serialization:
      indent-output: false
      fail-on-empty-beans: false

  # Spring Vision Configuration
  vision:
    djl:
      # Enable DJL backend (default: true)
      enabled: true

      # Engine selection: pytorch (default), tensorflow, mxnet, onnx
      engine: pytorch

      # Device: cpu (default), gpu, gpu:0, gpu:1, etc.
      device: cpu

      # Model cache directory (optional, defaults to ~/.djl/cache)
      # model-cache-dir: ${user.home}/.djl/cache

      # Auto-download models from DJL Model Zoo (default: true)
      auto-download: true

      # Show a progress bar during model download (default: false)
      show-progress: false

      # Maximum concurrent inference threads (default: 4)
      max-concurrent-inferences: 4

      # Face Detection Configuration
      face-detection:
        # Model: retinaface (default), lightface
        model: retinaface
        confidence-threshold: 0.7
        max-faces: 100

      # Face Recognition Configuration
      face-recognition:
        # Model: inception_resnet_v1 (default), facenet
        model: inception_resnet_v1
        embedding-size: 512
        similarity-threshold: 0.6

      # Object Detection Configuration
      object-detection:
        # Model: ssd (default), yolo
        model: ssd
        # Backbone: resnet50, mobilenet, etc.
        backbone: resnet50
        confidence-threshold: 0.5
        top-k: 10

      # Pose Estimation Configuration
      pose-estimation:
        model: simple_pose
        joints: 17  # COCO 17 keypoints
        confidence-threshold: 0.5

      # Action Recognition Configuration
      action-recognition:
        model: action_recognition
        confidence-threshold: 0.6

      # Segmentation Configuration
      segmentation:
        # Model: instance_segmentation, semantic_segmentation
        model: instance_segmentation
        instance-level: true

  # MCP Server Configuration (Spring AI 1.0.0 - stdio transport)
  ai:
    mcp:
      server:
        enabled: true
        transport: stdio
        name: spring-vision
        version: "1.0.5"
        description: "Spring Vision MCP Server - Computer Vision Operations via Model Context Protocol"

# Logging configuration - JSON format via logback-spring.xml
# CRITICAL: All logs go to stderr (console) or files, NOT stdout
# stdout is RESERVED for MCP JSON-RPC protocol messages only
logging:
  level:
    root: INFO
    io.github.codesapienbe.springvision: INFO
    org.springframework.ai: WARN
    org.springframework.ai.mcp: INFO
  # Pattern and file configurations are managed by logback-spring.xml
  # All logs use JSON format for consistent parsing
