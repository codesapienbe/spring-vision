# Spring Vision MCP Server Configuration
spring.application.name=spring-vision-mcp
# Logging configuration
logging.level.root=INFO
logging.level.io.github.codesapienbe.springvision=INFO
logging.level.org.springframework.ai.mcp=INFO
logging.level.io.modelcontextprotocol=WARN
# Disable unnecessary Spring Boot features for MCP stdio mode
spring.main.web-application-type=none
server.port=-1
# Vision backend configuration - OpenCV with all capabilities
spring.vision.opencv.enabled=true
spring.vision.opencv.confidence-threshold=0.7
# MCP Server Configuration
spring.ai.mcp.server.transport=stdio
spring.ai.mcp.server.name=spring-vision
spring.ai.mcp.server.version=1.0
# Graceful shutdown
spring.lifecycle.timeout-per-shutdown-phase=30s
# Disable banner for cleaner stdio output
spring.main.banner-mode=off
# Jackson configuration for JSON processing
spring.jackson.serialization.indent_output=false
spring.jackson.serialization.fail-on-empty-beans=false
