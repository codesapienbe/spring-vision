spring:
  vision:
    vector:
      provider: pgvector
      postgresql:
        enabled: true
        index-type: hnsw
        hnsw-m: 16
        hnsw-ef-construction: 64
  datasource:
    url: jdbc:postgresql://localhost:5432/springvision
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false 