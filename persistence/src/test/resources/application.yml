# Test configuration for Spring Vision Persistence module
# H2 in-memory database configuration for testing

spring:
  # DataSource configuration
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # JPA/Hibernate configuration
  jpa:
    hibernate:
      ddl-auto: create-drop

  # SQL initialization
  sql:
    init:
      mode: always  # Ensure Spring runs schema.sql for tests

  # Spring Vision Vector configuration
  vision:
    vector:
      provider: h2  # Use H2 as the vector provider in tests

